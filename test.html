<script>
(function(){
  var out=document.getElementById('results'), pass=0, fail=0;
  function isoAgo(n){return new Date(Date.now()-n*86400000).toISOString().slice(0,10);}
  function line(text,good,detail){
    var d=document.createElement('div');
    d.className=good?'pass':'fail';
    d.textContent=(good?'✓ ':'✗ ')+text+(good?'':'  — '+(detail||''));
    out.appendChild(d); good?pass++:fail++;
  }
  function ok(name,cond,detail){ line(name,!!cond,detail); }
  function eq(name,actual,expected){ line(name,actual===expected,'got '+JSON.stringify(actual)+', expected '+JSON.stringify(expected)); }

  // Known starting state (init()'s async loadData hasn't resolved yet, but we
  // reset explicitly so tests are deterministic regardless).
  APP.recipes=BUILTIN_RECIPES();
  APP.batches=[]; APP.logs={}; APP.bottling={}; APP.tastings={};
  APP.plannedBatches=[]; APP.supplies=[]; APP.celebrated={};

  // calcABV
  eq('calcABV 1.100 -> 1.000 = 13.1', calcABV(1.100,1.000), '13.1');

  // getBatchStatus lifecycle
  eq('status: 5d old = fermenting', getBatchStatus({id:'s1',startDate:isoAgo(5)}), 'fermenting');
  eq('status: 60d, unbottled = aging', getBatchStatus({id:'s2',startDate:isoAgo(60)}), 'aging');
  eq('status: failed object', getBatchStatus({id:'s4',failed:{category:'stuck'}}), 'failed');
  (function(){
    var b={id:'s3',startDate:isoAgo(100)};
    APP.bottling.s3={date:isoAgo(30),bottleCount:6,countsAtBottling:{750:6},locations:{cellar:{750:6}},fg:1.0};
    eq('status: bottled (bottles on hand)', getBatchStatus(b), 'bottled');
    delete APP.bottling.s3;
  })();

  // getBatchVesselHistory — the session regression (failed batches must close)
  (function(){
    APP.recipes=[{id:'r1',fermentDays:30}]; APP.bottling={}; APP.logs={};
    var active={id:'a1',recipeId:'r1',startDate:isoAgo(10),fermenterId:'f1'};
    var h=getBatchVesselHistory(active);
    eq('vessel: active batch stays open (null end)', h[h.length-1].endDate, null);
    var failed={id:'a2',recipeId:'r1',startDate:isoAgo(40),fermenterId:'f1',failed:{category:'stuck'}};
    APP.logs.a2=[{date:isoAgo(20),gravity:1.02}];
    var h2=getBatchVesselHistory(failed);
    ok('vessel: failed batch is closed (stops projecting)', h2[h2.length-1].endDate!=null, 'endDate='+h2[h2.length-1].endDate);
    APP.recipes=BUILTIN_RECIPES();
  })();

  // beerXMLToRecipe marks imports as custom (so they're deletable)
  (function(){
    var xml='<?xml version="1.0"?><RECIPES><RECIPE><NAME>T</NAME><TYPE>Mead</TYPE><OG>1.090</OG><FG>1.000</FG><BATCH_SIZE>5</BATCH_SIZE></RECIPE></RECIPES>';
    var r=beerXMLToRecipe(xml);
    ok('import: recipe parses', !!r, 'got null');
    ok('import: marked isCustom', !!(r&&r.isCustom));
  })();

  // computeShoppingNeeds smoke test
  (function(){
    var s=computeShoppingNeeds();
    ok('shopping: returns {lines,...}', s && typeof s==='object' && Array.isArray(s.lines));
  })();

  // projectFermentation from a descending gravity series
  (function(){
    APP.recipes=[{id:'r1',fgTarget:1.000,fermentDays:30}];
    var b={id:'p1',recipeId:'r1',startDate:isoAgo(10),og:1.100};
    APP.logs={p1:[{date:isoAgo(10),gravity:1.100},{date:isoAgo(5),gravity:1.050},{date:isoAgo(0),gravity:1.020}]};
    var p=projectFermentation(b);
    ok('projection: returns a result', !!p);
    ok('projection: drop rate > 0', p && p.ratePerDay>0, p?('rate='+p.ratePerDay):'null');
    ok('projection: FG not above current gravity', p && p.estFG<=1.020+1e-9, p?('estFG='+p.estFG):'null');
    APP.recipes=BUILTIN_RECIPES();
  })();

  // ---- calculators / conversions (pure logic) ----
  eq('calcABV 1.090 -> 1.000 = 11.8', calcABV(1.090,1.000), '11.8');
  ok('calcABV monotonic (higher OG -> higher ABV)', parseFloat(calcABV(1.120,1.000))>parseFloat(calcABV(1.090,1.000)));

  // SG <-> Brix
  (function(){
    ok('sgToBrix(1.000) ~ 0', Math.abs(sgToBrix(1.000))<0.1, 'got '+sgToBrix(1.000));
    ok('sgToBrix(1.040) ~ 9.9', Math.abs(sgToBrix(1.040)-9.9)<0.5, 'got '+sgToBrix(1.040));
    ok('sgToBrix out-of-range -> null', sgToBrix(0.5)===null);
    ok('brixToSG(10) ~ 1.040', Math.abs(brixToSG(10)-1.040)<0.002, 'got '+brixToSG(10));
    ok('SG<->Brix round-trip @1.060', Math.abs(brixToSG(sgToBrix(1.060))-1.060)<0.002, 'got '+brixToSG(sgToBrix(1.060)));
  })();

  // Unit conversions (pure SI helpers)
  ok('volFromSI/volToSI round-trip', Math.abs(volToSI(volFromSI(5))-5)<1e-9);
  ok('wtFromSI/wtToSI round-trip', Math.abs(wtToSI(wtFromSI(1.5))-1.5)<1e-9);

  // studioSweetIndex — bottling sweetness -> 4-point Dry..Sweet meter
  eq('sweet: Bone Dry -> 0', studioSweetIndex('Bone Dry'), 0);
  eq('sweet: Dry -> 0', studioSweetIndex('Dry'), 0);
  eq('sweet: Off-Dry -> 1', studioSweetIndex('Off-Dry'), 1);
  eq('sweet: Semi-Sweet -> 2', studioSweetIndex('Semi-Sweet'), 2);
  eq('sweet: Sweet -> 3', studioSweetIndex('Sweet'), 3);
  eq('sweet: Dessert -> 3', studioSweetIndex('Dessert'), 3);

  // labelStudioNetVol — per-bottle net contents + unit
  eq('netvol 750 ml', labelStudioNetVol({bottleVol:750}), '750 ml ℮');
  eq('netvol 750 -> cl', labelStudioNetVol({bottleVol:750},'cl'), '75 cl ℮');
  eq('netvol 750 -> L', labelStudioNetVol({bottleVol:750},'l'), '0.75 L ℮');

  // label ingredients reflect the batch's chosen yeast (regression guard)
  (function(){
    var ctx={recipe:{id:'rx',ingredients:[{item:'Wildflower Honey'},{item:'Spring Water'}]},batch:{id:'bx',yeast:'ec1118'},honey:'Wildflower'};
    var ing=labelStudioIngredients(ctx);
    ok('ingredients include EC-1118 yeast', /EC-?1118/i.test(ing), ing);
    ok('ingredients drop the default M05', ing.toLowerCase().indexOf('m05')<0, ing);
  })();

  // ---- mead-model (recipe configurator + advisor foundation) ----
  (function(){
    ok('honeyKg: OG 1.098 @ 5L ~ 1.68 kg', Math.abs(mwHoneyKg(1.098,5)-1.68)<0.05, 'got '+mwHoneyKg(1.098,5));
    ok('sugarBreak 1.098→1.010 = 1.069', Math.abs(mwSugarBreak(1.098,1.010)-1.069)<0.001, 'got '+mwSugarBreak(1.098,1.010));
    // EC-1118: 18% tolerance, high attenuation → ferments dry
    (function(){var t=mwYeastTargets(1.098,'ec1118');ok('yeastTargets ec1118 returns fg/abv', t&&t.fg<1.01&&t.abv>10, JSON.stringify(t));})();
    // M05: attenuation-limited target above 0.996
    (function(){var t=mwYeastTargets(1.120,'m05');ok('yeastTargets m05 high OG returns object', !!(t&&t.fg&&t.abv), JSON.stringify(t));})();
    eq('attenuation 1.098→1.069 ≈ 0.30', Math.round(mwAttenuation(1.098,1.069)*100)/100, 0.30);
    (function(){var n=mwNutrientGrams(5,1.098,'tosna');ok('nutrient tosna = 4 doses', n.doses===4&&n.total>0, JSON.stringify(n));})();
    (function(){var n=mwNutrientGrams(5,1.098,'sna');ok('nutrient sna = 2 doses', n.doses===2, JSON.stringify(n));})();
    // Nutrient dosing must scale with the YEAST's own nitrogen demand — a
    // low-N strain (EC-1118) needs meaningfully less than a high-N one
    // (Wyeast 4184) at the same OG/volume, not a flat one-size-fits-all gram total.
    (function(){
      var lowN=mwNutrientGrams(5,1.098,'sna','ec1118');
      var medN=mwNutrientGrams(5,1.098,'sna','m05');
      var highN=mwNutrientGrams(5,1.098,'sna','wyeast4184');
      var noId=mwNutrientGrams(5,1.098,'sna');
      ok('nutrientGrams: low-N yeast needs less total than medium', lowN.total<medN.total, JSON.stringify({low:lowN.total,med:medN.total}));
      ok('nutrientGrams: high-N yeast needs more total than medium', highN.total>medN.total, JSON.stringify({high:highN.total,med:medN.total}));
      ok('nutrientGrams: omitting yeastId keeps the old medium-only behaviour', noId.total===medN.total, JSON.stringify({noId:noId.total,med:medN.total}));
      ok('nutrientGrams: unknown yeastId falls back to medium, not a crash', mwNutrientGrams(5,1.098,'sna','not-a-real-yeast').total===medN.total, '');
      ok('nutrientGrams: reports which tier drove the total', lowN.yeastNitrogenNeed==='low'&&highN.yeastNitrogenNeed==='high', JSON.stringify({low:lowN.yeastNitrogenNeed,high:highN.yeastNitrogenNeed}));
    })();
    ok('yeastTargets null on bad OG', mwYeastTargets(0.9,'m05')===null);
    // Expectations Engine: yeast-speed-aware fermentation-duration range
    (function(){
      var vf=mwExpectedFermentDuration(42,'very-fast'), sl=mwExpectedFermentDuration(42,'slow'), md=mwExpectedFermentDuration(42,'medium');
      ok('expectedFermentDuration: returns a low<expected<high band', vf&&vf.low<vf.expected&&vf.expected<vf.high, JSON.stringify(vf));
      ok('expectedFermentDuration: a fast yeast is expected sooner than a medium one', vf.expected<md.expected, JSON.stringify({vf:vf,md:md}));
      ok('expectedFermentDuration: a slow yeast is expected later than a medium one', sl.expected>md.expected, JSON.stringify({sl:sl,md:md}));
      ok('expectedFermentDuration: unknown/missing speed falls back to medium', JSON.stringify(mwExpectedFermentDuration(42,null))===JSON.stringify(md), '');
      ok('expectedFermentDuration: null on no fermentDays', mwExpectedFermentDuration(0,'fast')===null, '');
      ok('expectedFermentDuration: low bound never goes below the 3-day floor', mwExpectedFermentDuration(1,'very-fast').low>=3, JSON.stringify(mwExpectedFermentDuration(1,'very-fast')));
    })();
    // Fruit/juice sugar must count toward OG — a melomel calculated as if
    // honey supplied 100% of the gravity always overshoots on honey.
    (function(){
      ok('adjunctHoneyEquiv: known fruit (blueberry) returns a positive honey-equivalent', mwAdjunctHoneyEquivalentKg('Blueberries',2)>0, mwAdjunctHoneyEquivalentKg('Blueberries',2));
      ok('adjunctHoneyEquiv: more sugary fruit (cherry) credits more than a milder one (blueberry) for the same kg', mwAdjunctHoneyEquivalentKg('Cherries',2)>mwAdjunctHoneyEquivalentKg('Blueberries',2), JSON.stringify({cherry:mwAdjunctHoneyEquivalentKg('Cherries',2),blueberry:mwAdjunctHoneyEquivalentKg('Blueberries',2)}));
      ok('adjunctHoneyEquiv: unrecognised name with no fallback contributes nothing (spice/oak stay honey-neutral)', mwAdjunctHoneyEquivalentKg('Cinnamon sticks',0.1)===0, mwAdjunctHoneyEquivalentKg('Cinnamon sticks',0.1));
      ok('adjunctHoneyEquiv: unrecognised name WITH an explicit fallback (wizard case) still credits something', mwAdjunctHoneyEquivalentKg('Dragonfruit',2,9)>0, mwAdjunctHoneyEquivalentKg('Dragonfruit',2,9));
      ok('adjunctHoneyEquiv: zero/negative kg contributes nothing', mwAdjunctHoneyEquivalentKg('Blueberries',0)===0, '');
      ok('adjunctHoneyEquiv: "pineapple" resolves to its own rate, not the generic "apple" one', mwAdjunctHoneyEquivalentKg('Pineapple',2)!==mwAdjunctHoneyEquivalentKg('Apple',2), JSON.stringify({pineapple:mwAdjunctHoneyEquivalentKg('Pineapple',2),apple:mwAdjunctHoneyEquivalentKg('Apple',2)}));
    })();
    // Timeline analyzer (E10): reads the SHAPE of the reading history, not
    // just the latest value — plateau detection, early-vs-recent pace, and
    // whether a plateau sits before or after the sugar break.
    (function(){
      ok('fermentTimeline: null with fewer than 3 readings', mwFermentTimeline([{date:isoAgo(3),gravity:1.10},{date:isoAgo(0),gravity:1.08}],1.069)===null, '');
      // Normal tail-off: drops hard early, then flattens AT/after the sugar break.
      var tailOff=[
        {date:isoAgo(18),gravity:1.1000},{date:isoAgo(15),gravity:1.0700},{date:isoAgo(12),gravity:1.0500},
        {date:isoAgo(9),gravity:1.0490},{date:isoAgo(6),gravity:1.0485},{date:isoAgo(3),gravity:1.0483},{date:isoAgo(0),gravity:1.0482}
      ];
      var tTail=mwFermentTimeline(tailOff,1.069);
      ok('fermentTimeline: detects a plateau once the tail flattens out', tTail&&tTail.plateaued===true&&tTail.plateauDays>=9, JSON.stringify(tTail));
      ok('fermentTimeline: a plateau AT/after the sugar break reads as a normal finish, not a stall', tTail&&tTail.slowedNearFinish===true&&tTail.stalledBeforeBreak===false, JSON.stringify(tTail));
      ok('fermentTimeline: recent pace is much slower than the early pace', tTail&&tTail.slowedDown===true&&tTail.recentRatePerDay<tTail.earlyRatePerDay, JSON.stringify({early:tTail&&tTail.earlyRatePerDay,recent:tTail&&tTail.recentRatePerDay}));
      // Abnormal early stall: flattens out WELL ABOVE the sugar break.
      var earlyStall=[
        {date:isoAgo(12),gravity:1.1000},{date:isoAgo(9),gravity:1.0800},{date:isoAgo(6),gravity:1.0795},
        {date:isoAgo(3),gravity:1.0792},{date:isoAgo(0),gravity:1.0790}
      ];
      var tEarly=mwFermentTimeline(earlyStall,1.069);
      ok('fermentTimeline: a plateau well above the sugar break flags as an abnormal early stall', tEarly&&tEarly.stalledBeforeBreak===true&&tEarly.slowedNearFinish===false, JSON.stringify(tEarly));
      // Steadily dropping, no plateau at all yet.
      var steady=[{date:isoAgo(9),gravity:1.100},{date:isoAgo(6),gravity:1.080},{date:isoAgo(3),gravity:1.060},{date:isoAgo(0),gravity:1.040}];
      ok('fermentTimeline: no plateau while gravity is still dropping steadily', mwFermentTimeline(steady,1.069).plateaued===false, JSON.stringify(mwFermentTimeline(steady,1.069)));
    })();
    // Weighted multi-cause stall diagnosis (E2): several ranked causes with
    // evidence, not a single first-match guess — and the timeline signal
    // should shift confidence, not just gate a boolean.
    (function(){
      var base={nutrientsComplete:true,fructoseStallRisk:false,nearTolerance:false,tempInRange:true,timeline:null};
      ok('stalledCauses: falls back to "unknown" (low confidence) when nothing matches', function(){var c=mwStalledCauses(base);return c.length===1&&c[0].cause==='unknown'&&c[0].weight<0.5;}(), JSON.stringify(mwStalledCauses(base)));
      var multi=Object.assign({},base,{nutrientsComplete:false,tempInRange:false});
      var mc=mwStalledCauses(multi);
      ok('stalledCauses: surfaces BOTH matching causes, ranked by weight', mc.length===2&&mc[0].cause==='nutrition'&&mc[1].cause==='temperature', JSON.stringify(mc));
      var withEarlyStall=Object.assign({},multi,{timeline:{stalledBeforeBreak:true,slowedNearFinish:false}});
      var withTailOff=Object.assign({},multi,{timeline:{stalledBeforeBreak:false,slowedNearFinish:true}});
      ok('stalledCauses: an early-stall timeline boosts confidence in every candidate cause', mwStalledCauses(withEarlyStall)[0].weight>mc[0].weight, JSON.stringify({boosted:mwStalledCauses(withEarlyStall)[0].weight,base:mc[0].weight}));
      ok('stalledCauses: a normal tail-off timeline REDUCES confidence — it may just be finishing', mwStalledCauses(withTailOff)[0].weight<mc[0].weight, JSON.stringify({reduced:mwStalledCauses(withTailOff)[0].weight,base:mc[0].weight}));
    })();
  })();

  // ---- recipe designer wizard: honey math must account for fruit/juice ----
  (function(){
    window._wiz={step:0,name:'',style:'Traditional Mead',volume:5,abv:12,sweetness:'semi',yeast:'m05',nutrient:'tosca2',adjunctName:'',adjunctAmount:''};
    var trad=wizComputeMath(window._wiz);
    ok('wizComputeMath: Traditional (no adjunct) contributes no honey credit', trad.adjunctHoneyEquivKg===0, JSON.stringify(trad));

    window._wiz.style='Melomel';window._wiz.adjunctName='Raspberries';window._wiz.adjunctAmount='';
    var melNoAmt=wizComputeMath(window._wiz);
    ok('wizComputeMath: Melomel with no typed amount still falls back to the wizard\'s own default fruit quantity', melNoAmt.adjunctHoneyEquivKg>0&&/kg/.test(melNoAmt.adjunctAmount), JSON.stringify(melNoAmt));
    ok('wizComputeMath: Melomel needs LESS honey than the same target with no fruit', melNoAmt.honeyKg<trad.honeyKg, JSON.stringify({melon:melNoAmt.honeyKg,trad:trad.honeyKg}));

    window._wiz.adjunctAmount='2 kg';
    var melTyped=wizComputeMath(window._wiz);
    ok('wizComputeMath: a typed fruit amount overrides the default and changes the honey credit', melTyped.adjunctHoneyEquivKg!==melNoAmt.adjunctHoneyEquivKg, JSON.stringify({typed:melTyped.adjunctHoneyEquivKg,def:melNoAmt.adjunctHoneyEquivKg}));
    ok('wizMathNote: mentions the fruit credit when one applies', /fruit\/juice/.test(wizMathNote(melTyped)), wizMathNote(melTyped));
    ok('wizMathNote: says nothing extra for a Traditional recipe', !/fruit\/juice/.test(wizMathNote(trad)), wizMathNote(trad));

    window._wiz.style='Cyser';window._wiz.adjunctName='Fresh apple juice';window._wiz.adjunctAmount='';
    var cyser=wizComputeMath(window._wiz);
    ok('wizComputeMath: Cyser (juice adjunct) also credits honey and defaults to a litre amount', cyser.adjunctHoneyEquivKg>0&&/L/.test(cyser.adjunctAmount), JSON.stringify(cyser));

    var built=wizBuildRecipe();
    var honeyLine=built.ingredients.filter(function(i){return i.item==='Honey';})[0];
    ok('wizBuildRecipe: the built recipe\'s honey line matches the netted honeyKg (no drift between math box and ingredient list)', honeyLine&&honeyLine.amount===cyser.honeyKg+' kg', JSON.stringify(honeyLine));
    window._wiz=null;
  })();

  // ---- advisor: signals + rules + health + readiness ----
  (function(){
    APP.recipes=[{id:'rA',ogTarget:1.098,fgTarget:1.010,abvTarget:11.5,fermentDays:42,minAgeDays:60,peakAgeDays:240,steps:[]}];
    // mid-ferment batch, dropping, past nothing yet
    var b={id:'adv1',recipeId:'rA',startDate:isoAgo(6),og:1.098,yeast:'ec1118'};
    APP.batches=[b];
    APP.logs={adv1:[{date:isoAgo(6),gravity:1.098,temp:19},{date:isoAgo(3),gravity:1.060,temp:19},{date:isoAgo(0),gravity:1.030,temp:19}]};
    APP.bottling={};APP.additions={};
    var s=mwBatchSignals(b);
    ok('signals: facts only object', s && s.og===1.098 && s.lastG===1.030, JSON.stringify(s&&{og:s.og,lastG:s.lastG}));
    ok('signals: attenuation ~0.69', s && Math.abs(s.attenuation-0.69)<0.03, s&&s.attenuation);

      ok('rules: pH in healthy band → no rec', phRule({active:true,latestPH:3.2,fermenting:true})===null, '');
      ok('rules: no pH logged → no rec', phRule({active:true,latestPH:null,fermenting:true})===null, '');

      var carbRule=ruleByName('carbonationDeveloping');
      ok('rules: carbonation-developing fires within 21 days of bottling', carbRule({sparkling:true,bottled:true,agedDays:10}).id==='carbonation-developing', '');
      ok('rules: carbonation-developing stops after 21 days', carbRule({sparkling:true,bottled:true,agedDays:30})===null, '');
      ok('rules: carbonation-developing skips still meads', carbRule({sparkling:false,bottled:true,agedDays:5})===null, '');

      var blowoffRule=ruleByName('blowoffRisk');
      ok('rules: blowoff-risk critical under 8% headspace', blowoffRule({fermenting:true,passedSugarBreak:false,stalled:false,nearFG:false,headspaceFrac:0.05,fermenterCapacity:5,volume:4.75}).severity==='critical', '');
      ok('rules: blowoff-risk recommended under 15% headspace', blowoffRule({fermenting:true,passedSugarBreak:false,stalled:false,nearFG:false,headspaceFrac:0.10,fermenterCapacity:5,volume:4.5}).severity==='recommended', '');
      ok('rules: blowoff-risk silent with ample headspace', blowoffRule({fermenting:true,passedSugarBreak:false,stalled:false,nearFG:false,headspaceFrac:0.3,fermenterCapacity:9,volume:6.3})===null, '');
      ok('rules: blowoff-risk silent past the sugar break (no longer vigorous)', blowoffRule({fermenting:true,passedSugarBreak:true,stalled:false,nearFG:false,headspaceFrac:0.05})===null, '');
      ok('rules: blowoff-risk silent with no fermenter assigned', blowoffRule({fermenting:true,passedSugarBreak:false,stalled:false,nearFG:false,headspaceFrac:null})===null, '');

      var longRule=ruleByName('fermentingLong');
      var frTest={low:15,expected:20,high:26};
      ok('rules: fermenting-long fires past the expected range', longRule({fermenting:true,stalled:false,nearFG:false,expectedFermentRange:frTest,daysSinceStart:35}).id==='fermenting-long', '');
      ok('rules: fermenting-long silent within the expected range', longRule({fermenting:true,stalled:false,nearFG:false,expectedFermentRange:frTest,daysSinceStart:25})===null, '');
      ok('rules: fermenting-long yields to a real stall', longRule({fermenting:true,stalled:true,nearFG:false,expectedFermentRange:frTest,daysSinceStart:35})===null, '');
      ok('rules: fermenting-long silent with no expected range available', longRule({fermenting:true,stalled:false,nearFG:false,expectedFermentRange:null,daysSinceStart:99})===null, '');

      var histRule=ruleByName('historicalPace');
      var histTest={avgDaysToFinish:24,avgRating:4.2,sampleSize:3,matchedOn:'recipe'};
      ok('rules: historical-pace fires with real own-history data', histRule({fermenting:true,daysSinceStart:20,historical:histTest}).id==='historical-pace', '');
      ok('rules: historical-pace silent with no comparable history', histRule({fermenting:true,daysSinceStart:20,historical:null})===null, '');
      ok('rules: historical-pace silent once bottled/not fermenting', histRule({fermenting:false,daysSinceStart:20,historical:histTest})===null, '');

      var bulkRule=ruleByName('extendedBulkAging');
      ok('rules: extended-bulk-aging fires past 270 unbottled days with no recipe target', bulkRule({bottled:false,status:'conditioning',daysSinceStart:300}).id==='extended-bulk-aging', '');
      ok('rules: extended-bulk-aging silent once actually bottled', bulkRule({bottled:true,status:'aging',daysSinceStart:300})===null, '');
      ok('rules: extended-bulk-aging silent for a young batch', bulkRule({bottled:false,status:'conditioning',daysSinceStart:60})===null, '');
      // Bulk-aging duration field: the recipe's OWN target (1.5x it) sets the
      // threshold instead of the flat 270 fallback — a recipe meant to sit a
      // long time isn't flagged at the same mark as a quick traditional.
      ok('rules: a LONG recipe bulk-age target raises the threshold well past 270', bulkRule({bottled:false,status:'aging',daysSinceStart:300,recipeBulkAgeDays:600})===null, '');
      ok('rules: a SHORT recipe bulk-age target flags well before the flat 270 default', bulkRule({bottled:false,status:'aging',daysSinceStart:100,recipeBulkAgeDays:60}).id==='extended-bulk-aging', '');
    })();
    // mwBatchHealth(): per-axis explainability — each axis reports WHY it
    // scored what it did (code + supporting data + its weight), not just a bare
    // number, so the view can render a plain-language reason under each bar.
    (function(){
      var base={active:true,og:1.100,fermenting:true,stalled:false,nearFG:false,
        tempInRange:true,tempStable:true,tempLow:16,tempHigh:24,latestTemp:20,
        nutrientsDone:2,nutrientsExpected:4,
        attenuation:0.5,expectedAttenuation:0.6,
        sugarBreak:1.070,passedSugarBreak:false,
        nearTolerance:false,abvMax:18};
      var h1=mwBatchHealth(base);
      ok('health: every axis carries a weight summing toward 100%', h1&&Math.abs(Object.keys(h1.axisReasons).reduce(function(s,k){return s+h1.axisReasons[k].weight;},0)-1)<1e-9, '');
      ok('health: temperature in-range-stable', h1.axisReasons.temperature.code==='in-range-stable', h1.axisReasons.temperature.code);
      ok('health: nutrition doses-partial with counts', h1.axisReasons.nutrition.code==='doses-partial'&&h1.axisReasons.nutrition.data.done===2&&h1.axisReasons.nutrition.data.expected===4, JSON.stringify(h1.axisReasons.nutrition));
      ok('health: gravity on-track (not stalled, not near FG)', h1.axisReasons.gravity.code==='on-track', h1.axisReasons.gravity.code);
      ok('health: oxygen ok before the sugar break', h1.axisReasons.oxygen.code==='ok', h1.axisReasons.oxygen.code);
      ok('health: yeast ok with no stall/tolerance pressure', h1.axisReasons.yeast.code==='ok', h1.axisReasons.yeast.code);

      var h2=mwBatchHealth(Object.assign({},base,{tempInRange:false,latestTemp:9,stalled:true,passedSugarBreak:true,nearTolerance:true}));
      ok('health: temperature out-of-range names cold/temp', h2.axisReasons.temperature.code==='out-of-range'&&h2.axisReasons.temperature.data.cold===true, JSON.stringify(h2.axisReasons.temperature));
      ok('health: gravity stalled', h2.axisReasons.gravity.code==='stalled', '');
      ok('health: oxygen past-break-fermenting', h2.axisReasons.oxygen.code==='past-break-fermenting', '');
      ok('health: yeast stress-stalled takes priority over near-tolerance', h2.axisReasons.yeast.code==='stress-stalled', h2.axisReasons.yeast.code);

      var h3=mwBatchHealth({active:false,og:null,fermenting:false,tempInRange:null,nutrientsDone:0,nutrientsExpected:0,sugarBreak:null});
      ok('health: unknown axes report known=false, not a guessed number', !h3.axisReasons.temperature.known&&!h3.axisReasons.gravity.known&&!h3.axisReasons.oxygen.known&&!h3.axisReasons.yeast.known&&!h3.axisReasons.nutrition.known, JSON.stringify(h3.axisReasons));
      ok('health: unknown axes carry no-data code', h3.axisReasons.temperature.code==='no-data', '');
      ok('health: overall score is null when nothing is known', h3.score===null, h3.score);
    })();
    // Correctness fix: getBatchStatus()'s calendar fallback can label a batch
    // 'aging' well before it's ever bottled (anyone not using the coach/logs).
    // mwBatchSignals().bottled and mwReadiness() must NOT treat that as a real
    // post-bottling drink-window — only an actual bottling record counts.
    (function(){
      APP.recipes=[{id:'rN',ogTarget:1.098,fgTarget:1.010,fermentDays:42,minAgeDays:60,peakAgeDays:240,steps:[]}];
      var neglected={id:'neg1',recipeId:'rN',startDate:isoAgo(90)};  // untouched, 90 days old, never bottled
      APP.batches=[neglected];APP.logs={};APP.bottling={};
      ok('signals: fallback "aging" status without a bottling record', getBatchStatus(neglected)==='aging', getBatchStatus(neglected));
      var sN=mwBatchSignals(neglected);
      ok('signals: bottled=false for a never-bottled batch, despite status="aging"', sN&&sN.bottled===false, sN&&sN.bottled);
      var rN=mwReadiness(neglected);
      ok('readiness: never-bottled batch stays in the low fermenting-style band, not a drink-window %', rN&&rN.pct<=30&&rN.phase==='fermenting', JSON.stringify(rN));
      APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.logs={};APP.bottling={};
    })();
    APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.logs={};APP.bottling={};APP.additions={};
  })();

  // batch list filter + sort (scale: windowing source)
  (function(){
    APP.recipes=[{id:'rA',ogTarget:1.098,fgTarget:1.010,steps:[]}];
    APP.batches=[
      {id:'L1',recipeId:'rA',name:'Alpha',startDate:isoAgo(2),volume:3},
      {id:'L2',recipeId:'rA',name:'Charlie',startDate:isoAgo(10),volume:9},
      {id:'L3',recipeId:'rA',name:'Bravo',startDate:isoAgo(6),volume:6}
    ];
    APP.logs={};APP.bottling={};
    APP.filters.batchStatus='all';APP.filters.batchSearch='';APP.filters.batchLimit=60;
    APP.filters.batchSort='newest';
    ok('batchlist: newest-first sort', _batchFilterSort().map(function(b){return b.id;}).join()==='L1,L3,L2', _batchFilterSort().map(function(b){return b.id;}).join());
    APP.filters.batchSort='oldest';
    ok('batchlist: oldest-first sort', _batchFilterSort()[0].id==='L2', '');
    APP.filters.batchSort='name';
    ok('batchlist: name A–Z sort', _batchFilterSort().map(function(b){return b.name;}).join()==='Alpha,Bravo,Charlie', '');
    APP.filters.batchSort='volume';
    ok('batchlist: volume high→low sort', _batchFilterSort()[0].id==='L2', '');
    APP.filters.batchSort='newest';APP.filters.batchSearch='bravo';
    ok('batchlist: search filters to 1', _batchFilterSort().length===1, '');
    APP.filters.batchSearch='';APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.logs={};
  })();

  // chart downsampling (scale: long reading series)
  (function(){
    var arr=[];for(var i=0;i<1000;i++)arr.push({date:'d'+i,gravity:1.1-i*0.0001});
    var ds=_downsampleLogs(arr,200);
    ok('downsample: caps to <=200', ds.length>0&&ds.length<=200, ds.length);
    ok('downsample: keeps first & last point', ds[0]===arr[0]&&ds[ds.length-1]===arr[arr.length-1], '');
    ok('downsample: passes small series through', _downsampleLogs(arr.slice(0,50),200).length===50, '');
  })();

  // global search index (scale: single linear scan, no per-entry find)
  (function(){
    APP.batches=[{id:'B1',name:'Cherry Bomb',recipeId:'rA',notes:'tart cherry'},{id:'B2',name:'Plain Mead',recipeId:'rA',notes:''}];
    APP.recipes=[{id:'rA',name:'Trad',style:'Show',difficulty:'Beginner',tags:[]},{id:'rZ',name:'Cherry Melomel Deluxe',style:'Melomel',difficulty:'Beginner',tags:['cherry']}];
    APP.tastings={B1:[{date:'2026-01-01',note:'bright cherry finish'}]};
    APP.logs={B1:[{id:'l1',date:'2026-01-02',note:'smells of cherry'}]};
    APP.additions={};APP.supplies=[{name:'Cherry juice',unit:'L',qty:2}];
    window._gsIndex=_buildGlobalSearchIndex();
    ok('search: index built once', Array.isArray(window._gsIndex)&&window._gsIndex.length>=5, window._gsIndex&&window._gsIndex.length);
    var h=performGlobalSearch('cherry');
    ok('search: batch match', h.batches.length===1&&h.batches[0].id==='B1', JSON.stringify(h.batches.map(function(b){return b.id;})));
    ok('search: tasting match', h.tastings.length===1, '');
    ok('search: log match', h.logs.length===1, '');
    ok('search: supply match', h.supplies.length===1, '');
    ok('search: recipe match', h.recipes.some(function(r){return r.id==='rZ';}), '');
    ok('search: empty query → no hits', performGlobalSearch('').batches.length===0, '');
    window._gsIndex=null;APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.tastings={};APP.logs={};APP.supplies=[];APP.additions={};
  })();

  // delta-save merge-patch (round-trip fidelity = the no-data-loss guarantee)
  (function(){
    function rt(base,nw){var d=mergePatchDiff(base,nw);if(d===undefined)return _deepEqual(base,nw);return _deepEqual(mergePatchApply(JSON.parse(JSON.stringify(base)),d),nw);}
    var base={batches:[{id:'b1',n:'x'}],logs:{b1:[{g:1.09}]},settings:{name:'Kim',u:'L'}};
    ok('patch: add batch + change + grow nested log arrays', rt(base,{batches:[{id:'b1',n:'y'},{id:'b2'}],logs:{b1:[{g:1.09},{g:1.05}],b2:[{g:1.1}]},settings:{name:'Kim',u:'L'}}), '');
    ok('patch: remove a key', rt(base,{batches:[{id:'b1',n:'x'}],logs:{b1:[{g:1.09}]},settings:{name:'Kim'}}), '');
    ok('patch: no change → undefined diff', mergePatchDiff(base,JSON.parse(JSON.stringify(base)))===undefined, '');
    ok('patch: array reorder reproduced', rt(base,{batches:[{id:'b1',n:'x'}],logs:{b1:[{g:1.05},{g:1.09}]},settings:{name:'Kim',u:'L'}}), '');
    // explicit-null is the one case merge-patch can't represent (null = delete);
    // the round-trip check must FAIL so saveData falls back to a full save.
    var d2=mergePatchDiff({a:1},{a:1,k:null});
    ok('patch: explicit-null → full-save fallback fires', !_deepEqual(mergePatchApply({a:1},d2),{a:1,k:null}), JSON.stringify(d2));
  })();

  // cross-batch ingredient performance analytics
  (function(){
    APP.recipes=[{id:'rA',ogTarget:1.100,fgTarget:1.010}];
    APP.batches=[
      {id:'p1',recipeId:'rA',yeast:'ec1118',honeyType:'Wildflower',og:1.100},
      {id:'p2',recipeId:'rA',yeast:'ec1118',honeyType:'Acacia',og:1.100,failed:{category:'stuck'}},
      {id:'p3',recipeId:'rA',yeast:'d47',honeyType:'Wildflower',og:1.100}
    ];
    APP.bottling={p1:{fg:1.000,abv:13},p3:{fg:1.010,abv:12}};
    APP.tastings={p1:[{rating:5}],p3:[{rating:3}]};APP.logs={};
    var st=mwIngredientStats();
    var ec=st.byYeast.filter(function(x){return x.key==='ec1118';})[0];
    ok('analytics: yeast batch count', ec&&ec.n===2, ec&&ec.n);
    ok('analytics: yeast failure rate', ec&&Math.abs(ec.failRate-0.5)<1e-9, ec&&ec.failRate);
    ok('analytics: avg rating uses only rated', ec&&Math.abs(ec.avgRating-5)<1e-9, ec&&ec.avgRating);
    var wf=st.byHoney.filter(function(x){return x.key==='Wildflower';})[0];
    ok('analytics: honey avg rating (5,3→4)', wf&&Math.abs(wf.avgRating-4)<1e-9, wf&&wf.avgRating);
    ok('analytics: sorted best-rating first', (st.byHoney[0].avgRating||0)>=(st.byHoney[st.byHoney.length-1].avgRating||0), '');
    APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.bottling={};APP.tastings={};APP.logs={};
  })();

  // Historical learning (E3): compare a batch to the BREWER'S OWN past
  // batches, not generic lore — honest null with too little real history.
  (function(){
    APP.recipes=[{id:'rH',ogTarget:1.100,fgTarget:1.010}];
    APP.batches=[
      {id:'cur1',recipeId:'rH',yeast:'ec1118',og:1.100,startDate:isoAgo(10)},
      {id:'h1',recipeId:'rH',yeast:'ec1118',og:1.100,startDate:isoAgo(50)},
      {id:'h2',recipeId:'rH',yeast:'ec1118',og:1.100,startDate:isoAgo(60),failed:{category:'stuck'}},
      {id:'h3',recipeId:'rH',yeast:'ec1118',og:1.100,startDate:isoAgo(60)}
    ];
    APP.bottling={h1:{date:isoAgo(20),fg:1.000,abv:13},h3:{date:isoAgo(24),fg:1.010,abv:12}};
    APP.tastings={h1:[{rating:5}],h3:[{rating:3}]};APP.logs={};
    var cur=APP.batches[0];
    var hc=mwHistoricalComparison(cur);
    ok('historicalComparison: matches on the SAME recipe first', hc&&hc.matchedOn==='recipe'&&hc.sampleSize===3, JSON.stringify(hc));
    ok('historicalComparison: avg days-to-finish uses only BOTTLED past batches (30,36→33)', hc&&Math.abs(hc.avgDaysToFinish-33)<0.6, hc&&hc.avgDaysToFinish);
    ok('historicalComparison: avg rating (5,3→4)', hc&&Math.abs(hc.avgRating-4)<1e-9, hc&&hc.avgRating);
    ok('historicalComparison: null for a batch with no past history at all', mwHistoricalComparison({id:'lonely',recipeId:'nobody-else',og:1.1,startDate:isoAgo(5)})===null, '');

    // Falls back to same-yeast comparison when there aren't 2+ same-recipe batches.
    APP.batches=[
      {id:'cur2',recipeId:'rNew',yeast:'ec1118',og:1.100,startDate:isoAgo(10)},
      {id:'hy1',recipeId:'rOther1',yeast:'ec1118',og:1.100,startDate:isoAgo(50)},
      {id:'hy2',recipeId:'rOther2',yeast:'ec1118',og:1.100,startDate:isoAgo(60)}
    ];
    var hcY=mwHistoricalComparison(APP.batches[0]);
    ok('historicalComparison: falls back to same-YEAST when recipe history is too thin', hcY&&hcY.matchedOn==='yeast'&&hcY.sampleSize===2, JSON.stringify(hcY));
    APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.bottling={};APP.tastings={};APP.logs={};
  })();

  // Ingredient relationship notes (E9): pragmatic honey×yeast facts reused
  // from EXISTING data fields — not invented numbers, not a generic graph.
  (function(){
    // D47 is an expressive yeast; Orange Blossom is a light/delicate honey
    // with no notable nitrogen offset — should flag the flavor mismatch only.
    var flavor=mwIngredientRelationship('Orange Blossom','d47');
    ok('ingredientRelationship: flags an expressive yeast masking a light honey', flavor.some(function(n){return n.type==='flavor-mismatch';}), JSON.stringify(flavor));
    ok('ingredientRelationship: does NOT flag nitrogen contribution when the offset is negligible', !flavor.some(function(n){return n.type==='nitrogen-contribution';}), JSON.stringify(flavor));
    // Forest honey has a real yanOffset (15) and is 'bold' (not light) — should
    // flag the nitrogen contribution only, not a flavor mismatch.
    var nitro=mwIngredientRelationship('Forest','ec1118');
    ok('ingredientRelationship: flags a honey with a real nitrogen contribution', nitro.some(function(n){return n.type==='nitrogen-contribution';}), JSON.stringify(nitro));
    ok('ingredientRelationship: does NOT flag flavor mismatch for a neutral yeast', !nitro.some(function(n){return n.type==='flavor-mismatch';}), JSON.stringify(nitro));
    ok('ingredientRelationship: [] for an unknown honey/yeast', JSON.stringify(mwIngredientRelationship('Not A Real Honey','not-a-real-yeast'))==='[]', '');
    ok('ingredientRelationship: never repeats the fructose interaction (that has its own dedicated rule)', !mwIngredientRelationship('Tupelo','ec1118').some(function(n){return n.type==='fructose-risk'||n.type==='fructose-ok';}), '');

    // End-to-end: the rule surfaces these notes for an active batch with a
    // real honey+yeast pair, and stays silent when nothing is notable.
    APP.recipes=[{id:'rIng',ogTarget:1.098,fgTarget:1.010,abvTarget:11.5,fermentDays:30,steps:[]}];
    var bi={id:'ing1',recipeId:'rIng',startDate:isoAgo(3),og:1.098,yeast:'d47',honeyType:'Orange Blossom'};
    APP.batches=[bi];APP.logs={ing1:[{date:isoAgo(3),gravity:1.098,temp:19},{date:isoAgo(0),gravity:1.090,temp:19}]};APP.bottling={};
    var ai=mwBatchAdvice(bi);
    var ingItem=ai.items.filter(function(i){return i.id==='ingredient-notes';})[0];
    ok('advice: ingredient-notes fires end-to-end for a batch with a notable pairing', ingItem&&ingItem.data.notes.length>0, JSON.stringify(ingItem&&ingItem.data));
    var biPlain={id:'ing2',recipeId:'rIng',startDate:isoAgo(3),og:1.098,yeast:'ec1118',honeyType:'Orange Blossom'};
    APP.batches=[biPlain];APP.logs={ing2:[{date:isoAgo(3),gravity:1.098,temp:19},{date:isoAgo(0),gravity:1.090,temp:19}]};
    ok('advice: ingredient-notes stays silent for an unremarkable pairing', !mwBatchAdvice(biPlain).items.some(function(i){return i.id==='ingredient-notes';}), JSON.stringify(mwBatchAdvice(biPlain).items.map(function(i){return i.id;})));
    APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.bottling={};APP.logs={};
  })();

  // competitions: survive the package→apply round-trip (persistence plumbing)
  (function(){
    APP.competitions={bx:[{id:'c1',competition:'State Fair',category:'M1A',award:'gold',score:38,maxScore:50}]};
    var pkg=packageState();
    ok('competitions: in packageState', pkg.competitions&&pkg.competitions.bx&&pkg.competitions.bx[0].award==='gold', '');
    APP.competitions={};
    applyState({competitions:{by:[{id:'c2',award:'silver'}]},batches:[]});
    ok('competitions: restored by applyState', APP.competitions.by&&APP.competitions.by[0].award==='silver', '');
    APP.competitions={};APP.batches=[];
  })();

  // custom step schedules: per-batch override + template persistence
  (function(){
    APP.recipes=[{id:'rA',steps:[{day:0,title:'Brew',desc:'x'},{day:14,title:'Rack',desc:'y'}]}];
    var b={id:'bb',recipeId:'rA',customSteps:[{day:5,title:'Nutrient',desc:'z'},{day:1,title:'Aerate',desc:'q'}]};
    var es=getEffectiveSteps(b,APP.recipes[0]);
    ok('steps: customSteps override + sort by day', es.length===2&&es[0].title==='Aerate'&&es[1].title==='Nutrient', es.map(function(s){return s.title;}).join());
    ok('steps: no override falls back to recipe', getEffectiveSteps({id:'bc',recipeId:'rA'},APP.recipes[0]).length===2, '');
    APP.stepTemplates=[{id:'t1',name:'My TOSNA',steps:[{day:1,title:'Dose 1',desc:''}]}];
    ok('stepTemplates: in packageState', packageState().stepTemplates[0].name==='My TOSNA', '');
    APP.stepTemplates=[];
    applyState({stepTemplates:[{id:'t2',name:'Restored',steps:[]}],batches:[]});
    ok('stepTemplates: restored by applyState', APP.stepTemplates[0]&&APP.stepTemplates[0].name==='Restored', '');
    APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.stepTemplates=[];
  })();

  // blend math (volume-weighted)
  (function(){
    var r=mwBlend([{og:1.100,fg:1.000,abv:13,vol:3},{og:1.000,fg:1.000,abv:0,vol:1}]);
    ok('blend: volume-weighted ABV (13×3/4)', Math.abs(r.abv-9.75)<1e-9, r.abv);
    ok('blend: weighted OG (1.075)', Math.abs(r.og-1.075)<1e-9, r.og);
    ok('blend: total volume', r.vol===4, r.vol);
    ok('blend: empty → zero volume', mwBlend([]).vol===0, '');
  })();

  var s=document.getElementById('summary');
  s.textContent=(fail===0?'✓ ALL PASS':'✗ '+fail+' FAILED')+'  ('+pass+'/'+(pass+fail)+')';
  s.className=fail===0?'pass':'fail';
})();
</script>
