<html lang="en">
<head>
<meta charset="utf-8">
<title>MeadOS — unit checks</title>
<style>
  body{font-family:'JetBrains Mono',monospace;background:#0a0a0b;color:#e8e0d0;padding:20px;line-height:1.6}
  h1{font-size:16px;letter-spacing:1px}
  .pass{color:#6ab87a}
  .fail{color:#c05050;font-weight:bold}
  #summary{font-size:18px;margin:4px 0 16px}
  .muted{color:#8a7d66;font-size:12px}
  #results div{padding:1px 0}
</style>
</head>
<body>
<h1>MeadOS — zero-dependency unit checks</h1>
<div class="muted">Open this at <code>/test.html</code> (or via file://). It loads the <code>core/</code> modules and asserts the data/logic functions. Re-run after changes to catch regressions.</div>

<!-- Minimal DOM skeleton so app.js init()/renderMain() don't crash on load. -->
<div id="app" style="display:none">
  <div id="topbar"><div id="topbar-crest"></div><div id="topbar-date"></div><div id="sync-badge"></div></div>
  <div id="sidebar"><div id="sidebar-batches"></div></div>
  <div id="main"></div>
</div>
<div id="toast"></div>
<button id="quick-log-fab"></button>

<div id="summary"></div>
<div id="results"></div>

<script>
(function(){
  var out=document.getElementById('results'), pass=0, fail=0;
  function isoAgo(n){return new Date(Date.now()-n*86400000).toISOString().slice(0,10);}
  function line(text,good,detail){
    var d=document.createElement('div');
    d.className=good?'pass':'fail';
    d.textContent=(good?'✓ ':'✗ ')+text+(good?'':'  — '+(detail||''));
    out.appendChild(d); good?pass++:fail++;
  }
  function ok(name,cond,detail){ line(name,!!cond,detail); }
  function eq(name,actual,expected){ line(name,actual===expected,'got '+JSON.stringify(actual)+', expected '+JSON.stringify(expected)); }

  // Known starting state (init()'s async loadData hasn't resolved yet, but we
  // reset explicitly so tests are deterministic regardless).
  APP.recipes=BUILTIN_RECIPES();
  APP.batches=[]; APP.logs={}; APP.bottling={}; APP.tastings={};
  APP.plannedBatches=[]; APP.supplies=[]; APP.celebrated={};

  // calcABV
  eq('calcABV 1.100 -> 1.000 = 13.1', calcABV(1.100,1.000), '13.1');

  // getBatchStatus lifecycle
  eq('status: 5d old = fermenting', getBatchStatus({id:'s1',startDate:isoAgo(5)}), 'fermenting');
  eq('status: 60d, unbottled = aging', getBatchStatus({id:'s2',startDate:isoAgo(60)}), 'aging');
  eq('status: failed object', getBatchStatus({id:'s4',failed:{category:'stuck'}}), 'failed');
  (function(){
    var b={id:'s3',startDate:isoAgo(100)};
    APP.bottling.s3={date:isoAgo(30),bottleCount:6,countsAtBottling:{750:6},locations:{cellar:{750:6}},fg:1.0};
    eq('status: bottled (bottles on hand)', getBatchStatus(b), 'bottled');
    delete APP.bottling.s3;
  })();

  // getBatchVesselHistory — the session regression (failed batches must close)
  (function(){
    APP.recipes=[{id:'r1',fermentDays:30}]; APP.bottling={}; APP.logs={};
    var active={id:'a1',recipeId:'r1',startDate:isoAgo(10),fermenterId:'f1'};
    var h=getBatchVesselHistory(active);
    eq('vessel: active batch stays open (null end)', h[h.length-1].endDate, null);
    var failed={id:'a2',recipeId:'r1',startDate:isoAgo(40),fermenterId:'f1',failed:{category:'stuck'}};
    APP.logs.a2=[{date:isoAgo(20),gravity:1.02}];
    var h2=getBatchVesselHistory(failed);
    ok('vessel: failed batch is closed (stops projecting)', h2[h2.length-1].endDate!=null, 'endDate='+h2[h2.length-1].endDate);
    APP.recipes=BUILTIN_RECIPES();
  })();

  // beerXMLToRecipe marks imports as custom (so they're deletable)
  (function(){
    var xml='<?xml version="1.0"?><RECIPES><RECIPE><NAME>T</NAME><TYPE>Mead</TYPE><OG>1.090</OG><FG>1.000</FG><BATCH_SIZE>5</BATCH_SIZE></RECIPE></RECIPES>';
    var r=beerXMLToRecipe(xml);
    ok('import: recipe parses', !!r, 'got null');
    ok('import: marked isCustom', !!(r&&r.isCustom));
  })();

  // computeShoppingNeeds smoke test
  (function(){
    var s=computeShoppingNeeds();
    ok('shopping: returns {lines,...}', s && typeof s==='object' && Array.isArray(s.lines));
  })();

  // projectFermentation from a descending gravity series
  (function(){
    APP.recipes=[{id:'r1',fgTarget:1.000,fermentDays:30}];
    var b={id:'p1',recipeId:'r1',startDate:isoAgo(10),og:1.100};
    APP.logs={p1:[{date:isoAgo(10),gravity:1.100},{date:isoAgo(5),gravity:1.050},{date:isoAgo(0),gravity:1.020}]};
    var p=projectFermentation(b);
    ok('projection: returns a result', !!p);
    ok('projection: drop rate > 0', p && p.ratePerDay>0, p?('rate='+p.ratePerDay):'null');
    ok('projection: FG not above current gravity', p && p.estFG<=1.020+1e-9, p?('estFG='+p.estFG):'null');
    APP.recipes=BUILTIN_RECIPES();
  })();

  // ---- calculators / conversions (pure logic) ----
  eq('calcABV 1.090 -> 1.000 = 11.8', calcABV(1.090,1.000), '11.8');
  ok('calcABV monotonic (higher OG -> higher ABV)', parseFloat(calcABV(1.120,1.000))>parseFloat(calcABV(1.090,1.000)));

  // SG <-> Brix
  (function(){
    ok('sgToBrix(1.000) ~ 0', Math.abs(sgToBrix(1.000))<0.1, 'got '+sgToBrix(1.000));
    ok('sgToBrix(1.040) ~ 9.9', Math.abs(sgToBrix(1.040)-9.9)<0.5, 'got '+sgToBrix(1.040));
    ok('sgToBrix out-of-range -> null', sgToBrix(0.5)===null);
    ok('brixToSG(10) ~ 1.040', Math.abs(brixToSG(10)-1.040)<0.002, 'got '+brixToSG(10));
    ok('SG<->Brix round-trip @1.060', Math.abs(brixToSG(sgToBrix(1.060))-1.060)<0.002, 'got '+brixToSG(sgToBrix(1.060)));
  })();

  // Unit conversions (pure SI helpers)
  ok('volFromSI/volToSI round-trip', Math.abs(volToSI(volFromSI(5))-5)<1e-9);
  ok('wtFromSI/wtToSI round-trip', Math.abs(wtToSI(wtFromSI(1.5))-1.5)<1e-9);

  // studioSweetIndex — bottling sweetness -> 4-point Dry..Sweet meter
  eq('sweet: Bone Dry -> 0', studioSweetIndex('Bone Dry'), 0);
  eq('sweet: Dry -> 0', studioSweetIndex('Dry'), 0);
  eq('sweet: Off-Dry -> 1', studioSweetIndex('Off-Dry'), 1);
  eq('sweet: Semi-Sweet -> 2', studioSweetIndex('Semi-Sweet'), 2);
  eq('sweet: Sweet -> 3', studioSweetIndex('Sweet'), 3);
  eq('sweet: Dessert -> 3', studioSweetIndex('Dessert'), 3);

  // labelStudioNetVol — per-bottle net contents + unit
  eq('netvol 750 ml', labelStudioNetVol({bottleVol:750}), '750 ml ℮');
  eq('netvol 750 -> cl', labelStudioNetVol({bottleVol:750},'cl'), '75 cl ℮');
  eq('netvol 750 -> L', labelStudioNetVol({bottleVol:750},'l'), '0.75 L ℮');

  // label ingredients reflect the batch's chosen yeast (regression guard)
  (function(){
    var ctx={recipe:{id:'rx',ingredients:[{item:'Wildflower Honey'},{item:'Spring Water'}]},batch:{id:'bx',yeast:'ec1118'},honey:'Wildflower'};
    var ing=labelStudioIngredients(ctx);
    ok('ingredients include EC-1118 yeast', /EC-?1118/i.test(ing), ing);
    ok('ingredients drop the default M05', ing.toLowerCase().indexOf('m05')<0, ing);
  })();

  // ---- mead-model (recipe configurator + advisor foundation) ----
  (function(){
    ok('honeyKg: OG 1.098 @ 5L ~ 1.68 kg', Math.abs(mwHoneyKg(1.098,5)-1.68)<0.05, 'got '+mwHoneyKg(1.098,5));
    ok('sugarBreak 1.098→1.010 = 1.069', Math.abs(mwSugarBreak(1.098,1.010)-1.069)<0.001, 'got '+mwSugarBreak(1.098,1.010));
    // EC-1118: 18% tolerance, high attenuation → ferments dry
    (function(){var t=mwYeastTargets(1.098,'ec1118');ok('yeastTargets ec1118 returns fg/abv', t&&t.fg<1.01&&t.abv>10, JSON.stringify(t));})();
    // M05: attenuation-limited target above 0.996
    (function(){var t=mwYeastTargets(1.120,'m05');ok('yeastTargets m05 high OG returns object', !!(t&&t.fg&&t.abv), JSON.stringify(t));})();
    eq('attenuation 1.098→1.069 ≈ 0.30', Math.round(mwAttenuation(1.098,1.069)*100)/100, 0.30);
    (function(){var n=mwNutrientGrams(5,1.098,'tosna');ok('nutrient tosna = 4 doses', n.doses===4&&n.total>0, JSON.stringify(n));})();
    (function(){var n=mwNutrientGrams(5,1.098,'sna');ok('nutrient sna = 2 doses', n.doses===2, JSON.stringify(n));})();
    ok('yeastTargets null on bad OG', mwYeastTargets(0.9,'m05')===null);
  })();

  // ---- advisor: signals + rules + health + readiness ----
  (function(){
    APP.recipes=[{id:'rA',ogTarget:1.098,fgTarget:1.010,abvTarget:11.5,fermentDays:42,minAgeDays:60,peakAgeDays:240,steps:[]}];
    // mid-ferment batch, dropping, past nothing yet
    var b={id:'adv1',recipeId:'rA',startDate:isoAgo(6),og:1.098,yeast:'ec1118'};
    APP.batches=[b];
    APP.logs={adv1:[{date:isoAgo(6),gravity:1.098,temp:19},{date:isoAgo(3),gravity:1.060,temp:19},{date:isoAgo(0),gravity:1.030,temp:19}]};
    APP.bottling={};APP.additions={};
    var s=mwBatchSignals(b);
    ok('signals: facts only object', s && s.og===1.098 && s.lastG===1.030, JSON.stringify(s&&{og:s.og,lastG:s.lastG}));
    ok('signals: attenuation ~0.69', s && Math.abs(s.attenuation-0.69)<0.03, s&&s.attenuation);
    ok('signals: sugarBreak computed', s && s.sugarBreak>1.0 && s.sugarBreak<1.098, s&&s.sugarBreak);
    var adv=mwBatchAdvice(b);
    ok('advice: snapshot has items[]+health+readiness', adv && Array.isArray(adv.items) && adv.health && adv.readiness, '');
    ok('advice: health score is 0..100', adv && adv.health.score>=0 && adv.health.score<=100, adv&&adv.health.score);
    ok('advice: severities valid', adv.items.every(function(i){return /^(critical|recommended|info)$/.test(i.severity);}), JSON.stringify(adv.items.map(function(i){return i.id+':'+i.severity;})));
    ok('advice: confidence 0..1', adv.items.every(function(i){return i.confidence>0&&i.confidence<=1;}), '');
    ok('advice: confidence number + reasons[]', typeof adv.confidence==='number'&&Array.isArray(adv.confidenceReasons)&&adv.confidenceReasons.length>0, JSON.stringify(adv.confidenceReasons));
    // stalled batch → critical 'stalled'
    (function(){
      var bs={id:'adv2',recipeId:'rA',startDate:isoAgo(20),og:1.098,yeast:'ec1118'};
      APP.batches=[bs];APP.logs={adv2:[{date:isoAgo(20),gravity:1.060},{date:isoAgo(10),gravity:1.058},{date:isoAgo(2),gravity:1.058}]};
      var a2=mwBatchAdvice(bs);
      ok('advice: stalled → critical item', a2.items.some(function(i){return i.id==='stalled'&&i.severity==='critical';}), JSON.stringify(a2.items.map(function(i){return i.id;})));
    })();
    // readiness for a bottled, well-aged batch → high
    (function(){
      var bb={id:'adv3',recipeId:'rA',startDate:isoAgo(400),og:1.098,yeast:'ec1118'};
      APP.batches=[bb];APP.logs={adv3:[{date:isoAgo(400),gravity:1.098},{date:isoAgo(360),gravity:1.005}]};
      APP.bottling={adv3:{date:isoAgo(300),countsAtBottling:{750:6},locations:{cellar:{750:6}},fg:1.005,abv:12}};
      var r=mwReadiness(bb);
      ok('readiness: long-aged near peak', r && r.pct>=100, JSON.stringify(r));
    })();
    // pre-break fermenting → aerate-now, and every item carries a category
    (function(){
      var bp={id:'adv4',recipeId:'rA',startDate:isoAgo(2),og:1.098,yeast:'ec1118'};
      APP.batches=[bp];APP.logs={adv4:[{date:isoAgo(2),gravity:1.098,temp:19},{date:isoAgo(0),gravity:1.090,temp:19}]};APP.bottling={};
      var a4=mwBatchAdvice(bp);
      ok('advice: pre-break → aerate-now', a4.items.some(function(i){return i.id==='aerate-now';}), JSON.stringify(a4.items.map(function(i){return i.id;})));
      ok('advice: every item has a category', a4.items.length>0&&a4.items.every(function(i){return typeof i.category==='string'&&i.category;}), JSON.stringify(a4.items.map(function(i){return i.id+':'+i.category;})));
    })();
    // bottled & inside drinking window → aging-window info milestone
    (function(){
      var bw={id:'adv6',recipeId:'rA',startDate:isoAgo(120),og:1.098,yeast:'ec1118'};
      APP.batches=[bw];APP.logs={adv6:[{date:isoAgo(120),gravity:1.098},{date:isoAgo(100),gravity:1.005}]};
      APP.bottling={adv6:{date:isoAgo(90),fg:1.005,abv:12,countsAtBottling:{750:6},locations:{cellar:{750:6}}}};
      var a6=mwBatchAdvice(bw);
      ok('advice: in-window → aging-window info', a6.items.some(function(i){return i.id==='aging-window'&&i.severity==='info';}), JSON.stringify(a6.items.map(function(i){return i.id;})));
    })();
    // high-fructose honey + non-fructophilic yeast → fructose-stall-risk warning
    (function(){
      var bf={id:'adv7',recipeId:'rA',startDate:isoAgo(3),og:1.098,yeast:'ec1118',honeyType:'Acacia'};
      APP.batches=[bf];APP.logs={adv7:[{date:isoAgo(3),gravity:1.098,temp:19},{date:isoAgo(0),gravity:1.085,temp:19}]};APP.bottling={};
      var sf=mwBatchSignals(bf);
      ok('signals: fructose-stall risk detected', sf && sf.fructoseStallRisk===true, JSON.stringify({honey:sf&&sf.honeyName,risk:sf&&sf.honeyFructoseRisk,fp:sf&&sf.yeastFructophilic}));
      var a7=mwBatchAdvice(bf);
      ok('advice: fructose honey → fructose-stall-risk', a7.items.some(function(i){return i.id==='fructose-stall-risk';}), JSON.stringify(a7.items.map(function(i){return i.id;})));
    })();
    APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.logs={};APP.bottling={};APP.additions={};
  })();

  // batch list filter + sort (scale: windowing source)
  (function(){
    APP.recipes=[{id:'rA',ogTarget:1.098,fgTarget:1.010,steps:[]}];
    APP.batches=[
      {id:'L1',recipeId:'rA',name:'Alpha',startDate:isoAgo(2),volume:3},
      {id:'L2',recipeId:'rA',name:'Charlie',startDate:isoAgo(10),volume:9},
      {id:'L3',recipeId:'rA',name:'Bravo',startDate:isoAgo(6),volume:6}
    ];
    APP.logs={};APP.bottling={};
    APP.filters.batchStatus='all';APP.filters.batchSearch='';APP.filters.batchLimit=60;
    APP.filters.batchSort='newest';
    ok('batchlist: newest-first sort', _batchFilterSort().map(function(b){return b.id;}).join()==='L1,L3,L2', _batchFilterSort().map(function(b){return b.id;}).join());
    APP.filters.batchSort='oldest';
    ok('batchlist: oldest-first sort', _batchFilterSort()[0].id==='L2', '');
    APP.filters.batchSort='name';
    ok('batchlist: name A–Z sort', _batchFilterSort().map(function(b){return b.name;}).join()==='Alpha,Bravo,Charlie', '');
    APP.filters.batchSort='volume';
    ok('batchlist: volume high→low sort', _batchFilterSort()[0].id==='L2', '');
    APP.filters.batchSort='newest';APP.filters.batchSearch='bravo';
    ok('batchlist: search filters to 1', _batchFilterSort().length===1, '');
    APP.filters.batchSearch='';APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.logs={};
  })();

  // chart downsampling (scale: long reading series)
  (function(){
    var arr=[];for(var i=0;i<1000;i++)arr.push({date:'d'+i,gravity:1.1-i*0.0001});
    var ds=_downsampleLogs(arr,200);
    ok('downsample: caps to <=200', ds.length>0&&ds.length<=200, ds.length);
    ok('downsample: keeps first & last point', ds[0]===arr[0]&&ds[ds.length-1]===arr[arr.length-1], '');
    ok('downsample: passes small series through', _downsampleLogs(arr.slice(0,50),200).length===50, '');
  })();

  // global search index (scale: single linear scan, no per-entry find)
  (function(){
    APP.batches=[{id:'B1',name:'Cherry Bomb',recipeId:'rA',notes:'tart cherry'},{id:'B2',name:'Plain Mead',recipeId:'rA',notes:''}];
    APP.recipes=[{id:'rA',name:'Trad',style:'Show',difficulty:'Beginner',tags:[]},{id:'rZ',name:'Cherry Melomel Deluxe',style:'Melomel',difficulty:'Beginner',tags:['cherry']}];
    APP.tastings={B1:[{date:'2026-01-01',note:'bright cherry finish'}]};
    APP.logs={B1:[{id:'l1',date:'2026-01-02',note:'smells of cherry'}]};
    APP.additions={};APP.supplies=[{name:'Cherry juice',unit:'L',qty:2}];
    window._gsIndex=_buildGlobalSearchIndex();
    ok('search: index built once', Array.isArray(window._gsIndex)&&window._gsIndex.length>=5, window._gsIndex&&window._gsIndex.length);
    var h=performGlobalSearch('cherry');
    ok('search: batch match', h.batches.length===1&&h.batches[0].id==='B1', JSON.stringify(h.batches.map(function(b){return b.id;})));
    ok('search: tasting match', h.tastings.length===1, '');
    ok('search: log match', h.logs.length===1, '');
    ok('search: supply match', h.supplies.length===1, '');
    ok('search: recipe match', h.recipes.some(function(r){return r.id==='rZ';}), '');
    ok('search: empty query → no hits', performGlobalSearch('').batches.length===0, '');
    window._gsIndex=null;APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.tastings={};APP.logs={};APP.supplies=[];APP.additions={};
  })();

  // delta-save merge-patch (round-trip fidelity = the no-data-loss guarantee)
  (function(){
    function rt(base,nw){var d=mergePatchDiff(base,nw);if(d===undefined)return _deepEqual(base,nw);return _deepEqual(mergePatchApply(JSON.parse(JSON.stringify(base)),d),nw);}
    var base={batches:[{id:'b1',n:'x'}],logs:{b1:[{g:1.09}]},settings:{name:'Kim',u:'L'}};
    ok('patch: add batch + change + grow nested log arrays', rt(base,{batches:[{id:'b1',n:'y'},{id:'b2'}],logs:{b1:[{g:1.09},{g:1.05}],b2:[{g:1.1}]},settings:{name:'Kim',u:'L'}}), '');
    ok('patch: remove a key', rt(base,{batches:[{id:'b1',n:'x'}],logs:{b1:[{g:1.09}]},settings:{name:'Kim'}}), '');
    ok('patch: no change → undefined diff', mergePatchDiff(base,JSON.parse(JSON.stringify(base)))===undefined, '');
    ok('patch: array reorder reproduced', rt(base,{batches:[{id:'b1',n:'x'}],logs:{b1:[{g:1.05},{g:1.09}]},settings:{name:'Kim',u:'L'}}), '');
    // explicit-null is the one case merge-patch can't represent (null = delete);
    // the round-trip check must FAIL so saveData falls back to a full save.
    var d2=mergePatchDiff({a:1},{a:1,k:null});
    ok('patch: explicit-null → full-save fallback fires', !_deepEqual(mergePatchApply({a:1},d2),{a:1,k:null}), JSON.stringify(d2));
  })();

  // cross-batch ingredient performance analytics
  (function(){
    APP.recipes=[{id:'rA',ogTarget:1.100,fgTarget:1.010}];
    APP.batches=[
      {id:'p1',recipeId:'rA',yeast:'ec1118',honeyType:'Wildflower',og:1.100},
      {id:'p2',recipeId:'rA',yeast:'ec1118',honeyType:'Acacia',og:1.100,failed:{category:'stuck'}},
      {id:'p3',recipeId:'rA',yeast:'d47',honeyType:'Wildflower',og:1.100}
    ];
    APP.bottling={p1:{fg:1.000,abv:13},p3:{fg:1.010,abv:12}};
    APP.tastings={p1:[{rating:5}],p3:[{rating:3}]};APP.logs={};
    var st=mwIngredientStats();
    var ec=st.byYeast.filter(function(x){return x.key==='ec1118';})[0];
    ok('analytics: yeast batch count', ec&&ec.n===2, ec&&ec.n);
    ok('analytics: yeast failure rate', ec&&Math.abs(ec.failRate-0.5)<1e-9, ec&&ec.failRate);
    ok('analytics: avg rating uses only rated', ec&&Math.abs(ec.avgRating-5)<1e-9, ec&&ec.avgRating);
    var wf=st.byHoney.filter(function(x){return x.key==='Wildflower';})[0];
    ok('analytics: honey avg rating (5,3→4)', wf&&Math.abs(wf.avgRating-4)<1e-9, wf&&wf.avgRating);
    ok('analytics: sorted best-rating first', (st.byHoney[0].avgRating||0)>=(st.byHoney[st.byHoney.length-1].avgRating||0), '');
    APP.recipes=BUILTIN_RECIPES();APP.batches=[];APP.bottling={};APP.tastings={};APP.logs={};
  })();

  var s=document.getElementById('summary');
  s.textContent=(fail===0?'✓ ALL PASS':'✗ '+fail+' FAILED')+'  ('+pass+'/'+(pass+fail)+')';
  s.className=fail===0?'pass':'fail';
})();
</script>
